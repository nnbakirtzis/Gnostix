services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: gnostix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gnostix
      POSTGRES_PASSWORD: gnostix
      POSTGRES_DB: gnostix
    ports:
      - "5432:5432"
    volumes:
      - gnostix-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnostix -d gnostix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gnostix-pgdata:
